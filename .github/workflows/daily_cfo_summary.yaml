name: Daily CFO Summary

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8am CT weekdays (UTC-5)
  workflow_dispatch:  # manual trigger

jobs:
  cfo-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic python-dotenv

      - name: Run CFO summary
        env:
          CAMPFIRE_API_KEY: ${{ secrets.CAMPFIRE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 campfire/cfo_summary.py
