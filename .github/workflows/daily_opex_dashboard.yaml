name: Daily Opex Dashboard

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8am ET weekdays
  workflow_dispatch:  # manual trigger

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Build opex dashboard
        env:
          CAMPFIRE_API_KEY: ${{ secrets.CAMPFIRE_API_KEY }}
        run: python3 -m campfire.opex

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: opex-dashboard
          path: campfire/opex/dashboard.html

